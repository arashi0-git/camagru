services:
  db:
    image: mariadb:10.11
    container_name: camagru-db
    environment:
      MARIADB_DATABASE: camagru
      MARIADB_USER: camagru_user
      MARIADB_PASSWORD: camagru_pass
      MARIADB_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-prootpass" ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
